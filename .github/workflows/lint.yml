on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

name: lint
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Install Go
      uses: actions/setup-go@v6.4.0
      with:
        go-version: 1.26.x
    - name: Checkout code
      uses: actions/checkout@v7.0.0
    - name: Run linters
      uses: golangci/golangci-lint-action@v9.2.0
      with:
        version: v2.12.2